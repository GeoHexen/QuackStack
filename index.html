<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="shortcut icon" href="favicon.ico">
    <title>QuackStack Consultancy | Cloud & Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* Deep cinematic blue gradient */
            background: radial-gradient(circle at 50% 40%, #1e40af 0%, #020617 70%);
            background-color: #020617;
        }
        .grid-overlay {
            background-image: linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        /* THE FADE EFFECT - Softens all edges into the blue background */
        .duck-spotlight {
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            transition: all 0.8s ease-in-out;
        }
        .duck-spotlight:hover {
            transform: scale(1.01);
            mask-image: radial-gradient(circle at center, black 50%, transparent 95%);
            -webkit-mask-image: radial-gradient(circle at center, black 50%, transparent 95%);
        }
    </style>
</head>
<body class="text-slate-300 font-sans min-h-screen overflow-x-hidden flex flex-col">

    <div class="fixed inset-0 grid-overlay pointer-events-none"></div>

    <nav class="relative z-20 max-w-7xl mx-auto px-8 py-8 w-full flex justify-between items-center">
        <div class="flex items-center">
            <span class="text-white font-black text-2xl tracking-tighter italic uppercase">QUACK<span class="text-cyan-400">stack</span></span>
        </div>
        <div class="flex items-center space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold">
            <a href="#" class="hover:text-cyan-400 transition">Services</a>
            <a href="#" class="hover:text-cyan-400 transition">Portfolio</a>
            <a href="https://github.com" class="bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 px-4 py-2 rounded-sm hover:bg-cyan-500 hover:text-black transition">Github</a>
        </div>
    </nav>

    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-8 py-12 text-center">
        
        <div class="relative w-full max-w-5xl mb-8 group">
            <div class="absolute inset-0 bg-cyan-500/10 blur-[120px] rounded-full opacity-60"></div>
            
            <div class="duck-spotlight">
                <img src="duck-logo.png" alt="QuackStack Consultancy" 
                     class="w-full h-auto drop-shadow-[0_0_30px_rgba(34,211,238,0.2)]">
            </div>
        </div>

        <div class="space-y-8 animate-fade-in">
            <div class="inline-block px-4 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/5 text-cyan-400 text-[10px] font-bold uppercase tracking-[0.4em]">
                The Future is Feathered
            </div>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
                <a href="https://app.yourdomain.com" 
                   class="bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 px-12 rounded-sm transition-all shadow-[0_0_30px_rgba(6,182,212,0.3)] hover:shadow-[0_0_50px_rgba(6,182,212,0.5)] uppercase tracking-widest text-sm">
                    Launch Project Environment
                </a>
            </div>
        </div>
    </main>

    <footer class="relative z-10 border-t border-white/5 py-10 bg-black/30 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center opacity-40">
            <div class="flex items-center space-x-2 text-[9px] tracking-[0.4em] uppercase">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span>Deployed on Microsoft Azure</span>
            </div>
            <div class="flex space-x-10 text-[9px] tracking-[0.2em] font-black">
                <span>PYTHON</span>
                <span>DOCKER</span>
                <span>STREAMLIT</span>
                <span>POSTGRES</span>
            </div>
            <div class="text-[9px]">© 2026 QUACKSTACK</div>
        </div>
    </footer>

</body>
</html>
